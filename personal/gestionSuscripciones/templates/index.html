<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suscripciones Pro | Control de Gastos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configuración de Tailwind para activar modo oscuro por clase
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkBg: '#0f172a',
            darkCard: '#1e293b'
          }
        }
      }
    }

    // Script de bloqueo para evitar el "flash" de luz al recargar en modo oscuro
    if (localStorage.getItem('dark-mode') === 'true' ||
      (!localStorage.getItem('dark-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Suavizado de transición global */
    body {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
  </style>
</head>

<body class="bg-slate-50 dark:bg-darkBg font-sans antialiased text-slate-900 dark:text-slate-100 min-h-screen">

  <div class="max-w-4xl mx-auto py-12 px-6">

    <header class="mb-12 flex justify-between items-center">
      <div>
        <h1 class="text-4xl font-black tracking-tight text-indigo-600 dark:text-indigo-400">MySubsMensuales</h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium mt-1">Analiza todos tus gastos mensuales.</p>
      </div>

      <button id="theme-toggle"
        class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-110 transition-all active:scale-95"
        aria-label="Cambiar modo de color">
        <i id="theme-icon-dark" class="fas fa-moon text-slate-600 hidden dark:block"></i>
        <i id="theme-icon-light" class="fas fa-sun text-yellow-500 block dark:hidden"></i>
      </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
      <div
        class="bg-white dark:bg-darkCard p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-5">
        <div class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 p-4 rounded-2xl">
          <i class="fas fa-wallet text-xl"></i>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Total Mensual</p>
          <h2 class="text-3xl font-black" id="total-gastos">$0.00</h2>
        </div>
      </div>

      <div
        class="bg-white dark:bg-darkCard p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-5">
        <div class="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 p-4 rounded-2xl">
          <i class="fas fa-layer-group text-xl"></i>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Suscripciones</p>
          <h2 class="text-3xl font-black" id="total-subs">0</h2>
        </div>
      </div>
    </div>

    <section
      class="bg-white dark:bg-darkCard p-8 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 mb-10">
      <h3 class="text-lg font-bold mb-6 flex items-center">
        <span class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center mr-3 text-sm">
          <i class="fas fa-plus"></i>
        </span>
        Nueva Suscripción
      </h3>

      <form id="form-suscripcion" class="grid grid-cols-1 md:grid-cols-12 gap-4">
        <div class="md:col-span-6">
          <label class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1">Servicio</label>
          <input type="text" id="servicio" placeholder="Netflix, Spotify, Gym..." required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>
        <div class="md:col-span-3">
          <label class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1">Costo</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-slate-400">$</span>
            <input type="number" step="0.01" id="costo" placeholder="0.00" required
              class="w-full pl-8 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
          </div>
        </div>
        <div class="md:col-span-3 flex items-end">
          <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-200 dark:shadow-none active:scale-95">
            Agregar
          </button>
        </div>
      </form>
    </section>

    <div
      class="bg-white dark:bg-darkCard rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-100 dark:border-slate-800">
            <tr>
              <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase">Servicio</th>
              <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase text-center">Mensualidad</th>
              <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase text-right">Acción</th>
            </tr>
          </thead>
          <tbody id="lista-suscripciones" class="divide-y divide-slate-50 dark:divide-slate-800">
          </tbody>
        </table>
      </div>

      <div id="estado-vacio" class="hidden py-20 text-center">
        <div
          class="bg-slate-100 dark:bg-slate-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-receipt text-3xl text-slate-300"></i>
        </div>
        <p class="text-slate-500 dark:text-slate-400 font-medium">No hay suscripciones registradas.</p>
      </div>
    </div>

  </div>

  <script>
    const API = '/api/suscripciones';

    async function load() {
      try {
        const res = await fetch(API);
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error("Error cargando datos:", err);
        // Fallback para pruebas locales si la API no existe
        render([]);
      }
    }

    function render(data) {
      const total = data.reduce((sum, s) => sum + s.costo, 0);
      document.getElementById('total-gastos').textContent = `$${total.toFixed(2)}`;
      document.getElementById('total-subs').textContent = data.length;

      const lista = document.getElementById('lista-suscripciones');
      const estadoVacio = document.getElementById('estado-vacio');

      if (data.length === 0) {
        lista.innerHTML = '';
        estadoVacio.classList.remove('hidden');
      } else {
        estadoVacio.classList.add('hidden');
        lista.innerHTML = data.map(s => `
          <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
            <td class="px-8 py-5 font-semibold text-slate-700 dark:text-slate-200">${s.servicio}</td>
            <td class="px-8 py-5 text-center font-mono font-bold text-indigo-600 dark:text-indigo-400">$${s.costo.toFixed(2)}</td>
            <td class="px-8 py-5 text-right">
              <button onclick="del(${s.id})" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors p-2">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        `).join('');
      }
    }

    document.getElementById('form-suscripcion').addEventListener('submit', async (e) => {
      e.preventDefault();
      const servicio = document.getElementById('servicio').value.trim();
      const costo = parseFloat(document.getElementById('costo').value);

      if (servicio && !isNaN(costo)) {
        await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ servicio, costo })
        });
        e.target.reset();
        load();
      }
    });

    async function del(id) {
      if (confirm('¿Eliminar esta suscripción?')) {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        load();
      }
    }

    // Lógica mejorada del Dark Mode
    const themeToggle = document.getElementById('theme-toggle');

    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('dark-mode', isDark);
    });

    // Cargar datos iniciales
    load();
  </script>
</body>

</html>
