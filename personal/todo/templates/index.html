<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Todo-List Python SQL</title>
    <style>
        body { font-family: Arial; background: #121212; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 300px; border: 1px solid #333; }
        input { width: 70%; padding: 8px; border-radius: 5px; border: none; }
        button { padding: 8px; background: #00ff88; border: none; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #252525; margin-bottom: 5px; padding: 10px; display: flex; justify-content: space-between; border-radius: 5px; }
        .del-btn { background: #ff4444; color: white; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Backend Python + SQL</h3>
        <input type="text" id="taskInput" placeholder="Nueva tarea...">
        <button onclick="add()">+</button>
        <ul id="list"></ul>
    </div>

    <script>
        const API = '/api/tareas';

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(t =>
                `<li>${t.titulo} <button class="del-btn" onclick="del(${t.id})">X</button></li>`
            ).join('');
        }

        async function add() {
            const input = document.getElementById('taskInput');
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({titulo: input.value})
            });
            input.value = '';
            load();
        }

        async function del(id) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            load();
        }

        load(); // Cargar al iniciar
    </script>
</body>
</html>
